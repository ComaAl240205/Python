<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Connected - Friends & Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <!-- TOPBAR -->
    <header class="topbar">
      <div>
        <h1>Connected</h1>
        <p class="sub">Freunde finden, chatten, verbunden bleiben.</p>
      </div>
      <div class="userbox" id="userBox" style="display:none;">
        <span id="whoami"></span>
        <button class="btn ghost" onclick="logout()">Logout</button>
      </div>
    </header>

    <!-- AUTH SECTION -->
    <section class="card" id="authCard">
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="showTab('login')">Login</button>
        <button class="tab" id="tabRegister" onclick="showTab('register')">Register</button>
      </div>

      <div id="loginView">
        <div class="grid2">
          <div class="form-group">
            <label>Username</label>
            <input id="loginUser" placeholder="max.mustermann" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input id="loginPass" type="password" placeholder="••••••••" />
          </div>
        </div>
        <button class="btn primary" onclick="login()">Login</button>
        <p class="hint" id="authMsg"></p>
      </div>

      <div id="registerView" style="display:none;">
        <div class="grid2">
          <div class="form-group">
            <label>Username</label>
            <input id="regUser" placeholder="Dein Username (min. 3)" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input id="regPass" type="password" placeholder="Min. 6 Zeichen" />
          </div>
        </div>
        <button class="btn primary" onclick="register()">Account erstellen</button>
        <p class="hint" id="regMsg"></p>
      </div>
    </section>

    <!-- APP SECTION (nach Login) -->
    <section class="app-layout" id="appView" style="display:none;">

      <!-- SIDEBAR -->
      <aside class="sidebar">

        <!-- FREUNDE SECTION -->
        <div class="sidebar-section">
          <div class="sidebar-head">
            <h2>Freunde</h2>
            <button class="btn small" onclick="showTab('friends-search')">+ Hinzufügen</button>
          </div>
          <div id="friendsList" class="sidebar-list"></div>
        </div>

        <!-- ANFRAGEN SECTION -->
        <div class="sidebar-section">
          <div class="sidebar-head">
            <h2>Anfragen</h2>
          </div>
          <div id="requestsIndicator" style="display:none;" class="sidebar-item" onclick="showTab('requests')">
            <div class="sidebar-item-name">📬 <span id="requestCount">0</span> neue</div>
          </div>
          <div id="noRequests" class="sidebar-item" style="background: transparent; border: none; cursor: default; color: var(--text-muted); font-size: 12px;">
            Keine Anfragen
          </div>
        </div>

      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-panel">

        <!-- FREUNDE TAB: Suchen & Hinzufügen -->
        <section id="tab-friends-search" style="display:none;">
          <div class="panel-head">
            <h2 class="panel-title">Neue Freunde hinzufügen</h2>
          </div>
          <div class="panel-content">
            <div class="form-group">
              <label>Benutzername suchen</label>
              <input id="searchUsername" type="text" placeholder="Gib einen Username ein..." />
            </div>
            <button class="btn primary" onclick="sendFriendRequest()">Anfrage senden</button>
            <p class="hint" id="searchMsg"></p>
            <div id="searchResults" style="margin-top: 20px;"></div>
          </div>
        </section>

        <!-- REQUESTS TAB: Pending Requests -->
        <section id="tab-requests" style="display:none;">
          <div class="panel-head">
            <h2 class="panel-title">Freundschaftsanfragen</h2>
          </div>
          <div class="panel-content">
            <div id="requestsContainer" style="display: flex; flex-direction: column; gap: 12px;"></div>
            <div id="emptyRequests" class="empty-state">
              <div class="empty-state-icon">✓</div>
              <p>Keine neuen Anfragen</p>
            </div>
          </div>
        </section>

        <!-- CHAT TAB -->
        <section id="tab-chat" style="display:none;" class="chat-container">
          <div class="panel-head" id="chatHead">
            <h2 class="panel-title">
              <span class="status-online" id="chatUserStatus" style="display:none;"></span>
              <span id="chatWithUser">Wähle einen Freund</span>
            </h2>
          </div>
          <div id="noChatSelected" class="empty-state"
          style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;">
          <div class="empty-state-icon">👋</div>
            <p style="max-width:320px;text-align:center;">
              Wähle links einen Freund aus<br>
              oder füge einen neuen hinzu, um zu chatten
            </p>
          </div>
          <div id="chatWrapper" style="display:none; flex: 1; flex-direction: column;">
            <div class="chat-messages" id="chatMessages"></div>
            <div id="typingIndicator" class="typing-indicator" style="padding: 0 20px; display:none;"></div>
            <div class="chat-input-area">
              <textarea id="chatInput" placeholder="Schreib eine Nachricht..." rows="1"></textarea>
              <button class="btn primary chat-send-btn" onclick="sendMessage()">↑</button>
            </div>
          </div>
        </section>

      </main>

    </section>

  </div>

  <script src="script_friend_system.js"></script>
  <script src="ui_modern.js"></script>
</body>
</html>
